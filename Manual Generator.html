<html lang="zh-CN"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --accent-color: #27ae60;
            --bg-color: #f0f0f2;
        }
        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        /* 控制面板 */
        .ui-panel {
            background: white; padding: 20px; border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%; max-width: 900px; margin-bottom: 30px;
        }
        .file-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 15px;
        }
        .file-input { display: flex; flex-direction: column; font-size: 12px; }
        .file-input label { font-weight: bold; margin-bottom: 5px; color: #555; }
        
        textarea {
            width: 100%; height: 200px;
            border: 1px solid #d2d2d7; border-radius: 8px;
            padding: 12px; box-sizing: border-box;
            font-family: "SF Mono", Menlo, monospace; font-size: 12px;
            background: #fafafa;
        }
        .btns { margin-top: 15px; display: flex; gap: 10px; justify-content: flex-end; }
        button {
            padding: 10px 24px; border-radius: 20px; border: none;
            cursor: pointer; font-weight: 500; transition: 0.2s;
        }
        .btn-pre { background: #e5e5e7; color: #1d1d1f; }
        .btn-down { 
            background: var(--accent-color); color: white; 
            opacity: 0.3; pointer-events: none;
        }
        .btn-down.active { opacity: 1; pointer-events: auto; }

        /* 预览区域样式修复 */
        #render-wrapper {
            background: #666; padding: 40px 0; width: 100%;
            display: flex; justify-content: center; border-radius: 8px;
        }
        
        /* 强制覆盖预览目标的内部样式 */
        #render-target .page {
            margin: 0 !important; /* 必须为 0，防止坐标计算偏移 */
            box-shadow: none !important;
            height: 296.5mm !important; 
            overflow: hidden !important;
            display: block !important;
        }
    </style>
</head>
<body>

<div class="ui-panel">
    <div class="file-grid">
        <div class="file-input">
            <label>1. 主图 (main.jpeg)</label>
            <input type="file" id="f_main" accept="image/*">
        </div>
        <div class="file-input">
            <label>2. 尺寸图 (size.jpeg)</label>
            <input type="file" id="f_size" accept="image/*">
        </div>
        <div class="file-input">
            <label>3. 详情图 (detail.jpeg)</label>
            <input type="file" id="f_detail" accept="image/*">
        </div>
    </div>

    <textarea id="code-input" placeholder="请在此处粘贴您的 HTML 代码..."></textarea>

    <div class="btns">
        <button class="btn-pre" onclick="doPreview()">1. 预览渲染</button>
        <button id="down-btn" class="btn-down" onclick="doDownload()">2. 生成单页 PDF</button>
    </div>
</div>

<div id="render-wrapper">
    <div id="render-target">
        <div style="color:white; padding: 100px;">等待渲染内容...</div>
    </div>
</div>

<script>
    let urls = {};

    function doPreview() {
        const code = document.getElementById('code-input').value.trim();
        const m = document.getElementById('f_main').files[0];
        const s = document.getElementById('f_size').files[0];
        const d = document.getElementById('f_detail').files[0];

        if (!code || !m || !s || !d) {
            alert("请检查：确保 HTML 代码已填入，且 3 张图片均已上传。");
            return;
        }

        Object.values(urls).forEach(u => URL.revokeObjectURL(u));
        urls['main.jpeg'] = URL.createObjectURL(m);
        urls['size.jpeg'] = URL.createObjectURL(s);
        urls['detail.jpeg'] = URL.createObjectURL(d);

        let finalHtml = code;
        for (const [name, url] of Object.entries(urls)) {
            finalHtml = finalHtml.replace(new RegExp(name, 'g'), url);
        }

        const target = document.getElementById('render-target');
        target.innerHTML = finalHtml;

        const imgs = target.getElementsByTagName('img');
        const promises = Array.from(imgs).map(img => {
            return new Promise(resolve => {
                if (img.complete) resolve();
                else { img.onload = resolve; img.onerror = resolve; }
            });
        });

        Promise.all(promises).then(() => {
            document.getElementById('down-btn').classList.add('active');
        });
    }

    async function doDownload() {
        // 优先定位 .page 类元素
        const element = document.querySelector('#render-target .page') || document.getElementById('render-target');
        
        const opt = {
            margin:       0,
            filename:     'Manual_SinglePage.pdf',
            image:        { type: 'jpeg', quality: 1.0 },
            html2canvas:  { 
                scale: 3, 
                useCORS: true,
                logging: false,
                // 核心修复：强制忽略当前浏览器的滚动位置
                scrollY: 0, 
                scrollX: 0,
                // 锁定捕获的宽度高度
                width: element.offsetWidth,
                height: element.offsetHeight
            },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
            pagebreak:    { mode: 'avoid-all' }
        };

        try {
            // 在导出前将页面临时滚回到顶部也是一种稳妥做法
            window.scrollTo(0, 0); 
            await html2pdf().set(opt).from(element).save();
        } catch (err) {
            console.error(err);
            alert("生成失败，请刷新页面重试。");
        }
    }
</script>


</body></html>
