<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual Generator</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #2c3e50; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* 左侧控制台 */
        .sidebar { width: 380px; background: white; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.3); display: flex; flex-direction: column; overflow-y: auto; z-index: 10; }
        h1 { font-size: 18px; color: #2c3e50; margin-top: 0; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        
        .step { margin-bottom: 20px; background: #f8f9f9; padding: 15px; border-radius: 6px; border: 1px solid #e5e8e8; }
        .step-title { font-weight: bold; font-size: 14px; color: #d35400; margin-bottom: 8px; }
        .tips { font-size: 11px; color: #7f8c8d; margin-bottom: 10px; line-height: 1.4; }
        
        /* 图片上传按钮 */
        .file-upload { display: flex; align-items: center; margin-bottom: 8px; }
        .file-upload label { display: inline-block; width: 80px; font-size: 12px; color: #34495e; font-weight: bold;}
        .file-upload input { flex: 1; font-size: 12px; }
        
        /* 代码输入框 */
        textarea { width: 100%; height: 250px; padding: 10px; box-sizing: border-box; border: 1px solid #bdc3c7; border-radius: 4px; resize: vertical; font-family: monospace; font-size: 12px; background: #fdfefe; }
        
        /* 按钮 */
        button { background-color: #3498db; color: white; border: none; padding: 12px 15px; font-size: 14px; border-radius: 4px; cursor: pointer; transition: background 0.3s; width: 100%; font-weight: bold; margin-top: 10px; }
        button:hover { background-color: #2980b9; }
        button:disabled { background-color: #95a5a6; cursor: not-allowed; }
        .btn-print { background-color: #27ae60; margin-top: 15px; }
        .btn-print:hover { background-color: #1e8449; }

        /* 右侧预览区 */
        .preview-area { flex: 1; display: flex; justify-content: center; align-items: flex-start; padding: 40px 20px; overflow-y: auto; }
        
        /* A4 纸张容器的外部阴影 */
        .a4-wrapper { filter: drop-shadow(0 10px 30px rgba(0,0,0,0.5)); margin-bottom: 40px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>🚀 一键 PDF 生成器</h1>
        
        <div class="step">
            <div class="step-title">1. 上传实拍图</div>
            <div class="tips">无需重命名，直接选择本地图片。</div>
            <div class="file-upload">
                <label>主外观图:</label>
                <input type="file" id="imgMain" accept="image/*">
            </div>
            <div class="file-upload">
                <label>尺寸标注:</label>
                <input type="file" id="imgSize" accept="image/*">
            </div>
            <div class="file-upload">
                <label>安装细节:</label>
                <input type="file" id="imgDetail" accept="image/*">
            </div>
        </div>

        <div class="step">
            <div class="step-title">2. 粘贴 AI 生成的 JSON 数据</div>
            <div class="tips">请将 AI 按标准模板生成的 { } 代码粘贴至此。</div>
            <textarea id="jsonInput" placeholder='{\n  "title": "产品名称",\n  ...\n}'></textarea>
            <button onclick="generatePreview()">⚡ 渲染预览</button>
        </div>

        <div class="step">
            <div class="step-title">3. 导出文件</div>
            <div class="tips">跳过打印弹窗，直接保存为标准单页 A4 PDF 文件。</div>
            <button id="downloadBtn" class="btn-print" onclick="downloadPDF()">⬇️ 直接下载单页 PDF</button>
        </div>
    </div>

    <div class="preview-area">
        <div class="a4-wrapper">
            <div id="pdf-export-element"></div>
        </div>
    </div>

    <script>
        const imagesBase64 = { main: '', size: '', detail: '' };

        // 文件转 Base64
        function handleFileUpload(inputId, key) {
            document.getElementById(inputId).addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(event) { imagesBase64[key] = event.target.result; };
                    reader.readAsDataURL(file);
                }
            });
        }
        handleFileUpload('imgMain', 'main');
        handleFileUpload('imgSize', 'size');
        handleFileUpload('imgDetail', 'detail');

        // 生成预览
        function generatePreview() {
            let jsonString = document.getElementById('jsonInput').value.trim();
            if(!jsonString) { alert("请先粘贴 JSON 数据！"); return; }

            // 清理 AI 可能输出的 markdown 标记
            jsonString = jsonString.replace(/```json/gi, '').replace(/```/g, '').trim();

            let data;
            try {
                data = JSON.parse(jsonString);
            } catch (e) {
                alert("JSON 格式错误，请检查 AI 输出的内容是否完整！\n错误信息: " + e.message);
                return;
            }

            // 处理图片占位符
            const img1 = imagesBase64.main || 'https://placehold.co/400x400?text=Upload+Main+Image';
            const img2 = imagesBase64.size || 'https://placehold.co/400x400?text=Upload+Size+Image';
            const img3 = imagesBase64.detail || 'https://placehold.co/400x400?text=Upload+Detail+Image';

            // 构建表格
            let specsHtml = '';
            if(data.specs && data.specs.length > 0) {
                data.specs.forEach(spec => {
                    specsHtml += `<tr><th>${spec.key}</th><td>${spec.value}</td></tr>`;
                });
            }

            // 构建列表
            let featuresHtml = '';
            if(data.features && data.features.length > 0) {
                data.features.forEach(feat => {
                    let formattedFeat = feat.replace(/^([^:]+:)/, '<strong>$1</strong>');
                    featuresHtml += `<li>${formattedFeat}</li>`;
                });
            }

            // 动态注入严格隔离的 CSS
            // 修复点：将 height 从 297mm 改为 296.5mm 防止溢出分页
            const styleId = "dynamic-pdf-style";
            let styleTag = document.getElementById(styleId);
            if (!styleTag) {
                styleTag = document.createElement('style');
                styleTag.id = styleId;
                document.head.appendChild(styleTag);
            }
            
            styleTag.innerHTML = `
                #pdf-export-element { width: 210mm; height: 296.5mm; padding: 15mm 20mm; background: white; box-sizing: border-box; overflow: hidden; position: relative; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; color: #333; }
                #pdf-export-element header { border-bottom: 3px solid ${data.themeColor || '#3498db'}; padding-bottom: 12px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: flex-end; }
                #pdf-export-element h1 { font-size: 22px; margin: 0; text-transform: uppercase; color: #2c3e50; letter-spacing: 1px; line-height: 1; }
                #pdf-export-element .subtitle { font-size: 13px; color: #7f8c8d; margin-top: 5px; font-weight: normal; }
                #pdf-export-element .header-info { text-align: right; font-size: 11px; color: #555; line-height: 1.4; }
                #pdf-export-element .content-grid { display: grid; grid-template-columns: 38% 58%; gap: 4%; }
                #pdf-export-element h2 { font-size: 13px; color: ${data.themeColor || '#3498db'}; border-left: 4px solid ${data.themeColor || '#3498db'}; padding-left: 8px; margin-top: 12px; margin-bottom: 10px; text-transform: uppercase; }
                #pdf-export-element .image-box { position: relative; width: 100%; aspect-ratio: 1 / 1; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 10px; background: #fff; overflow: hidden; }
                #pdf-export-element .image-box img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }
                #pdf-export-element table { width: 100%; border-collapse: collapse; font-size: 10px; margin-bottom: 12px; }
                #pdf-export-element th, #pdf-export-element td { padding: 5px 6px; border-bottom: 1px solid #eee; text-align: left; vertical-align: top; }
                #pdf-export-element th { background-color: ${data.lightThemeColor || '#ebf5fb'}; color: #2c3e50; font-weight: bold; width: 32%; }
                #pdf-export-element .info-box { background: #fdfefe; border: 1px dashed ${data.themeColor || '#3498db'}; padding: 10px; border-radius: 4px; font-size: 10px; margin-bottom: 12px; line-height: 1.5; color: #444; }
                #pdf-export-element ul { padding-left: 18px; margin: 0; font-size: 10px; color: #444; }
                #pdf-export-element li { margin-bottom: 5px; line-height: 1.4; }
                #pdf-export-element footer { position: absolute; bottom: 12mm; left: 20mm; right: 20mm; text-align: center; font-size: 9px; color: #aaa; border-top: 1px solid #eee; padding-top: 8px; }
            `;

            // 写入 HTML 结构
            const htmlContent = `
                <header>
                    <div>
                        <h1>${data.title || 'Product Title'}</h1>
                        <div class="subtitle">${data.subtitle || ''}</div>
                    </div>
                    <div class="header-info">
                        <strong>${data.headerInfo1 || ''}</strong><br>
                        <strong>${data.headerInfo2 || ''}</strong>
                    </div>
                </header>
                <div class="content-grid">
                    <div class="left-col">
                        <h2 style="margin-top: 0;">Product View</h2>
                        <div class="image-box"><img src="${img1}"></div>
                        <h2>Dimensions</h2>
                        <div class="image-box"><img src="${img2}"></div>
                        <h2>Detail View</h2>
                        <div class="image-box"><img src="${img3}"></div>
                    </div>
                    <div class="right-col">
                        <h2 style="margin-top: 0;">Specifications</h2>
                        <table>${specsHtml}</table>
                        <h2>${data.fitmentTitle || 'Fitment Guide'}</h2>
                        <div class="info-box">${data.fitmentDesc || ''}</div>
                        <h2>${data.featureTitle || 'Key Features'}</h2>
                        <ul>${featuresHtml}</ul>
                        ${data.note ? `<div style="margin-top: 15px; font-size: 9px; color: #7f8c8d; border-left: 2px solid #bdc3c7; padding-left: 8px; background: #fdfefe; padding-top: 5px; padding-bottom: 5px;"><strong>Note:</strong> ${data.note}</div>` : ''}
                    </div>
                </div>
                <footer>Professional Motorcycle Parts | Standard Specification Manual</footer>
            `;

            document.getElementById('pdf-export-element').innerHTML = htmlContent;
        }

        // 直接下载 PDF 的核心逻辑
        function downloadPDF() {
            const element = document.getElementById('pdf-export-element');
            if(element.innerHTML.trim() === '') {
                alert("请先生成预览内容！");
                return;
            }

            // 按钮防抖与状态提示
            const btn = document.getElementById('downloadBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = "⏳ 正在生成 PDF，请稍候...";
            btn.disabled = true;

            // html2pdf 配置参数
            // 修复点：添加 scrollY: 0 防止因页面滚动条导致的偏移溢出
            const opt = {
                margin:       0,
                filename:     '产品说明书.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true, logging: false, scrollY: 0 }, 
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            // 调用引擎直接生成并下载
            html2pdf().set(opt).from(element).save().then(() => {
                // 恢复按钮状态
                btn.innerHTML = originalText;
                btn.disabled = false;
            }).catch(err => {
                alert("生成失败，请检查网络是否能够加载 PDF 组件包。");
                btn.innerHTML = originalText;
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
